<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOC App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- PIN -->
<div id="pinScreen" class="screen active">
  <h1>EVOC Access</h1>
  <input type="password" id="pinInput" placeholder="Enter PIN">
  <button onclick="checkPin()">Enter</button>
</div>

<div id="appScreen" class="screen">

  <!-- TOP -->
  <div class="top-bar">
    <div class="cadet-block">
      <label>Cadet</label>
      <select id="cadetSelect"></select>
    </div>

    <div class="run-block">
      <label><input type="checkbox" name="runType"> Practice Run</label>
      <label><input type="checkbox" name="runType"> Qualifying Run</label>
      <label><input type="checkbox" name="runType"> Remedial</label>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="button-row">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="endTimer()">End</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <!-- SPLIT + TIMER -->
  <div class="middle-row">

    <div class="left-panel">
      <div onclick="setSplit('skid')" id="skidBtn">Skid Exit</div>
      <div onclick="setSplit('north')" id="northBtn">North Intersection</div>
      <div class="finish">
        End Time:
        <span id="finishTime" onclick="editTime('finish')">--:--</span>
      </div>
    </div>

    <div class="timer-box">
      <div id="timerDisplay">00:00</div>
    </div>

  </div>

  <!-- TABLE HEADER -->
  <div class="table-header">
    <div>Cones Location</div>
    <div>Inside</div>
    <div>Outside</div>
    <div># Hit</div>
  </div>

  <!-- TABLE -->
  <div id="conesContainer"></div>

  <!-- COMMENTS -->
  <div class="comments-box">
    <label>Instructor Comments</label>
    <textarea id="comments"></textarea>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div id="status">Qualifying / Non-Qualifying</div>
    <button onclick="submitRun()">Submit</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
