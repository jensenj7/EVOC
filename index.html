<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EVOC App</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>

<body>

<!-- 🔐 PIN SCREEN -->
<div id="pinScreen" class="screen active">
  <h1>EVOC Access</h1>
  <input type="password" id="pinInput" placeholder="Enter PIN"/>
  <button onclick="checkPin()">Enter</button>
</div>

<!-- 🚔 MAIN APP -->
<div id="appScreen" class="screen">

  <!-- TOP ROW -->
  <header class="top-row">
    <select id="cadetSelect"></select>

    <div class="run-types">
      <label><input type="checkbox" name="runType" value="Practice"> Practice</label>
      <label><input type="checkbox" name="runType" value="Qualifying"> Qualifying</label>
      <label><input type="checkbox" name="runType" value="Remedial"> Remedial</label>
    </div>
  </header>

  <!-- CONTROLS -->
  <div class="controls-row">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="endTimer()">End</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <!-- MAIN ROW -->
  <div class="main-row">

    <!-- LEFT -->
    <div class="splits-panel">
      <div onclick="setSplit('skid')" id="skidBtn">Skid Exit</div>
      <div onclick="setSplit('north')" id="northBtn">North Intersection</div>

      <div class="finish">
        Finish:
        <span onclick="editTime('finish')" id="finishTime">--:--</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="timer-panel">
      <div id="timerDisplay">00:00</div>
    </div>

  </div>

  <div id="status" class="status">STATUS: --</div>

  <!-- CONES -->
  <div class="cones" id="conesContainer"></div>

  <!-- COMMENTS -->
  <textarea id="comments" placeholder="Instructor Comments"></textarea>

  <button class="submit" onclick="submitRun()">Submit</button>

</div>

<script src="app.js"></script>
</body>
</html>
