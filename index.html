<!DOCTYPE html>
  <button onclick="checkPin()">Enter</button>
</div>

<div id="appScreen" class="screen">

  <div class="top-bar">
    <div class="cadet-block">
      <label>Cadet</label>
      <select id="cadetSelect"></select>
    </div>

    <div class="run-block">
      <label><input type="checkbox" name="runType"> Practice Run</label>
      <label><input type="checkbox" name="runType"> Qualifying Run</label>
      <label><input type="checkbox" name="runType"> Remedial</label>
    </div>
  </div>

  <div class="button-row">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="endTimer()">End</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <div class="middle-row">

    <div class="left-panel">
      <div onclick="handleSplit('skid')" id="skidBtn">Skid Exit</div>
      <div onclick="handleSplit('north')" id="northBtn">North Intersection</div>
      <div onclick="handleSplit('finish')" id="finishBtn">
        End Time: <span id="finishTimeValue">--:--</span>
      </div>
      <div onclick="toggleDNF()" id="dnfBtn">DNF</div>
    </div>

    <div class="timer-box">
      <div id="timerDisplay">00:00</div>
    </div>

  </div>

  <div class="table-header">
    <div>Cones Location</div>
    <div class="center">Inside</div>
    <div class="center">Outside</div>
    <div class="center">#/Gate</div>
  </div>

  <div id="conesContainer"></div>

  <textarea id="comments"></textarea>

  <div class="footer">
    <div id="status">Status</div>
    <button onclick="submitRun()">Submit</button>
  </div>

</div>

</div>

<div id="splitModal" class="modal hidden">
  <div class="modal-box">
    <h3>Edit Split Time</h3>
    <input id="splitInput" type="text" placeholder="MM:SS">
    <div class="modal-buttons">
      <button onclick="saveSplitEdit()">Save</button>
      <button onclick="closeSplitModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
