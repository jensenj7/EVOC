<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOC App</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="EVOC 192.png">
</head>

<body>

<div class="app-container">

<div id="pinScreen" class="screen active">

  <img src="EVOC 192.png" class="pin-logo">

  <h1>EVOC Access</h1>

  <div class="pin-form">
    <input type="password" id="pinInput">
    <button onclick="checkPin()">Enter</button>
  </div>

</div>

<div id="appScreen" class="screen">

  <div class="page-menu">
    <label for="pageSelect">Course</label>
    <select id="pageSelect" onchange="switchPage(this.value)">
      <option value="road-course">Road Course</option>
      <option value="aa">AA</option>
    </select>
  </div>

  <div id="roadCoursePage" class="course-page active-page">
  <div class="top-bar">
    <div class="cadet-block">
      <label>Cadet</label>
      <select id="cadetSelect"></select>
    </div>

    <div class="run-block">
      <label><input type="checkbox" name="runType" onchange="handleRunTypeSelection(this)"> Practice Run</label>
      <label><input type="checkbox" name="runType" onchange="handleRunTypeSelection(this)"> Qualifying Run</label>
      <label><input type="checkbox" name="runType" onchange="handleRunTypeSelection(this)"> Remedial</label>
    </div>
  </div>

  <div class="button-row">
    <button class="timer-btn start-btn" onclick="startTimer()">Start</button>
    <button id="pauseBtn" class="timer-btn pause-btn" onclick="togglePauseResume()">Pause</button>
    <button class="timer-btn end-btn" onclick="endTimer()">End</button>
    <button class="timer-btn clear-btn" onclick="clearAll()">Clear</button>
  </div>

  <div class="middle-row">

    <div class="left-panel">
      <div class="split-btn" onclick="handleSplit('skid')" id="skidBtn">Skid Exit</div>
      <div class="split-btn" onclick="handleSplit('north')" id="northBtn">North Intersection</div>

      <div class="split-btn" onclick="handleSplit('finish')" id="finishBtn">
        End Time:
        <span id="finishTimeValue">--:--</span>
      </div>

      <div class="split-btn" onclick="toggleDNF()" id="dnfBtn">DNF</div>
    </div>

    <div class="timer-box">
      <div id="timerDisplay">00:00</div>
    </div>

  </div>

  <div class="table-header">
    <div>Cones Location</div>
    <div class="center">Inside</div>
    <div class="center">Outside</div>
    <div class="center">#/Gate</div>
  </div>

  <div id="conesContainer"></div>

  <div class="comments-label">Instructor Comments</div>
  <textarea id="comments" placeholder="optional"></textarea>

  <div class="footer">
      <div id="status" class="status-display qual">
         Qualifying
      </div>

      <div id="syncStatus" class="sync-status">All runs synced</div>

      <button class="submit-btn" onclick="submitRun()">Submit</button>
  </div>

  </div>

  <div id="aaPage" class="course-page">
    <h2 class="aa-title">Accident Avoidance</h2>

    <div class="top-bar">
      <div class="cadet-block">
        <label>Cadet</label>
        <select id="aaCadetSelect"></select>
      </div>
    </div>

    <div class="aa-grid">
      <div class="aa-field">
        <label for="speedIn">Speed In</label>
        <input type="number" id="speedIn" inputmode="numeric" min="0" placeholder="mph">
      </div>

      <div class="aa-field">
        <label for="directionSelect">Direction</label>
        <select id="directionSelect">
          <option value="">Select Direction</option>
          <option value="Left">Left</option>
          <option value="Right">Right</option>
        </select>
      </div>

      <div class="aa-field">
        <label for="speedOut">Speed Out</label>
        <input type="number" id="speedOut" inputmode="numeric" min="0" placeholder="mph">
      </div>
    </div>

    <div class="aa-subheading">Cones Hit</div>

    <div class="table-header aa-table-header">
      <div>Location</div>
      <div class="center">Inside</div>
      <div class="center">Outside</div>
    </div>

    <div id="aaConesContainer"></div>

    <div class="aa-subheading">Instructor Observations</div>

    <div id="observationsGrid" class="observations-grid"></div>

    <div class="aa-subheading">Results</div>
    <div class="results-block">
      <label><input type="checkbox" name="aaResult" onchange="handleAAResultSelection(this)"> Qualifying Run</label>
      <label><input type="checkbox" name="aaResult" onchange="handleAAResultSelection(this)"> Non-Qualifying Run</label>
      <label><input type="checkbox" name="aaResult" onchange="handleAAResultSelection(this)"> Remedial Run</label>
    </div>

    <div class="footer">
      <div class="sync-status" id="aaSyncStatus">All runs synced</div>
      <button class="submit-btn" onclick="submitAARun()">Submit</button>
    </div>
  </div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
